name: cleanup-expired-rooms

on:
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Call cleanup API
        run: |
          set -euo pipefail
          base_url="${APP_URL%/}"
          curl -fsS "$base_url/api/cleanup"
        env:
          APP_URL: ${{ secrets.APP_URL }}
